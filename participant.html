<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>General Anesthesia</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'IBM Plex Mono',monospace}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;opacity:1;transition:opacity .3s;background:#000}
.screen.hidden{opacity:0;pointer-events:none}

/* ── LOGIN ── */
#screen-login .title{font-size:9px;letter-spacing:4px;color:#1a2535;text-transform:uppercase;margin-bottom:52px;text-align:center}
#screen-login .field{width:100%;max-width:260px;display:flex;flex-direction:column;gap:10px}
#screen-login label{font-size:8px;letter-spacing:3px;color:#1a2535;text-transform:uppercase;text-align:center}
#screen-login input{background:#050709;border:1px solid #0e1822;color:#dde4ee;text-align:center;font-size:22px;letter-spacing:5px;padding:14px;font-family:'IBM Plex Mono',monospace;border-radius:2px;outline:none;transition:border-color .2s;text-transform:uppercase}
#screen-login input:focus{border-color:#1e3550}
#screen-login .enter-btn{background:none;border:1px solid #0e1822;color:#1a2535;font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:12px;cursor:pointer;border-radius:2px;transition:all .2s}
#screen-login .enter-btn:active{border-color:#1e3550;color:#2a4060}
#screen-login .err{font-size:9px;color:#ff3c3c;text-align:center;min-height:14px;letter-spacing:1px;margin-top:4px}

/* ── WAITING ── */
#screen-waiting .pid{font-size:9px;letter-spacing:4px;color:#0e1e2e;text-transform:uppercase;margin-bottom:52px}
.pulse{width:6px;height:6px;background:#152030;border-radius:50%;animation:pulse 2.5s infinite;margin:0 auto}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.6;transform:scale(1.4)}}
#screen-waiting .txt{font-size:11px;color:#152030;letter-spacing:3px;text-align:center;text-transform:uppercase;margin-top:28px;line-height:1.8}

/* ── TRANSIT ── */
#screen-transit .pid{font-size:9px;letter-spacing:4px;color:#0e1e2e;text-transform:uppercase;margin-bottom:44px}
#screen-transit .pre{font-size:8px;letter-spacing:3px;color:#1e3044;text-transform:uppercase;margin-bottom:10px;text-align:center}
#screen-transit .num{font-size:80px;font-weight:300;color:#ffaa00;line-height:1;text-align:center;animation:up .4s ease}
#screen-transit .name{font-size:10px;letter-spacing:3px;color:#1a2e44;text-transform:uppercase;margin:4px 0 28px;text-align:center}
#screen-transit .timer{font-size:28px;font-weight:300;color:#1e3a55;text-align:center;letter-spacing:4px;margin-bottom:10px}
#screen-transit .bar{width:180px;height:2px;background:#0a1520;border-radius:1px;overflow:hidden;margin:0 auto}
#screen-transit .bar-fill{height:100%;background:#ffaa00;border-radius:1px;transition:width 1s linear}

/* ── BUFFERING ── */
#screen-buffering .pid{font-size:9px;letter-spacing:4px;color:#0e1e2e;text-transform:uppercase;margin-bottom:44px}
#screen-buffering .pre{font-size:8px;letter-spacing:3px;color:#1e3044;text-transform:uppercase;margin-bottom:10px;text-align:center}
#screen-buffering .num{font-size:80px;font-weight:300;color:#ffaa00;line-height:1;text-align:center}
#screen-buffering .name{font-size:10px;letter-spacing:3px;color:#1a2e44;text-transform:uppercase;margin:4px 0 28px;text-align:center}
#screen-buffering .txt{font-size:10px;color:#152030;letter-spacing:2px;text-align:center;text-transform:uppercase;margin-top:20px;line-height:1.8}

/* ── ACTIVE ── */
#screen-active .pid{font-size:9px;letter-spacing:4px;color:#0e1e2e;text-transform:uppercase;margin-bottom:44px}
#screen-active .pre{font-size:8px;letter-spacing:3px;color:#1e3044;text-transform:uppercase;margin-bottom:10px;text-align:center}
#screen-active .num{font-size:88px;font-weight:300;color:#00e87a;line-height:1;text-align:center;animation:up .4s ease}
#screen-active .name{font-size:10px;letter-spacing:3px;color:#1e3550;text-transform:uppercase;margin:4px 0 24px;text-align:center}
#screen-active .msg{font-size:12px;color:#2a4060;line-height:1.8;text-align:center}

/* ── DONE ── */
#screen-done .pid{font-size:9px;letter-spacing:4px;color:#0e1e2e;text-transform:uppercase;margin-bottom:44px}
#screen-done .check{font-size:64px;color:#00e87a;text-align:center;margin-bottom:16px}
#screen-done .msg{font-size:10px;color:#1e3550;letter-spacing:2px;text-align:center;line-height:1.8;text-transform:uppercase}

.tag{position:absolute;bottom:24px;left:0;right:0;text-align:center;font-size:8px;letter-spacing:3px;color:#0a1520;text-transform:uppercase}

@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="screen" id="screen-login">
  <div class="title">General Anesthesia</div>
  <div class="field">
    <label>Twoje ID</label>
    <input id="id-input" placeholder="XXXXXXX" maxlength="16"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
    <button class="enter-btn" onclick="doLogin()">Wejdź</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- WAITING -->
<div class="screen hidden" id="screen-waiting">
  <div class="pid" id="w-pid"></div>
  <div class="pulse"></div>
  <div class="txt">Poczekaj.<br/>Instrukcje wkrótce.</div>
  <div class="tag" id="w-tag"></div>
</div>

<!-- TRANSIT -->
<div class="screen hidden" id="screen-transit">
  <div class="pid" id="tr-pid"></div>
  <div class="pre">Idź do</div>
  <div class="num" id="tr-num"></div>
  <div class="name" id="tr-name"></div>
  <div class="timer" id="tr-timer">0:00</div>
  <div class="bar"><div class="bar-fill" id="tr-fill"></div></div>
  <div class="tag" id="tr-tag"></div>
</div>

<!-- BUFFERING -->
<div class="screen hidden" id="screen-buffering">
  <div class="pid" id="bu-pid"></div>
  <div class="pre">Jesteś w</div>
  <div class="num" id="bu-num"></div>
  <div class="name" id="bu-name"></div>
  <div class="pulse"></div>
  <div class="txt">Czekasz na grupę.</div>
  <div class="tag" id="bu-tag"></div>
</div>

<!-- ACTIVE -->
<div class="screen hidden" id="screen-active">
  <div class="pid" id="ac-pid"></div>
  <div class="pre">Jesteś w</div>
  <div class="num" id="ac-num"></div>
  <div class="name" id="ac-name"></div>
  <div class="msg" id="ac-msg"></div>
  <div class="tag" id="ac-tag"></div>
</div>

<!-- DONE -->
<div class="screen hidden" id="screen-done">
  <div class="pid" id="dn-pid"></div>
  <div class="check">✓</div>
  <div class="msg">Twoje doświadczenie<br/>dobiegło końca.<br/><br/>Pozostań na miejscu.</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBzo6qVmam_u-H2asl3GIPRU_JBbMCPN9g",
  authDomain: "general-anesthesia-cf511.firebaseapp.com",
  databaseURL: "https://general-anesthesia-cf511-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "general-anesthesia-cf511",
  storageBucket: "general-anesthesia-cf511.firebasestorage.app",
  messagingSenderId: "839292271507",
  appId: "1:839292271507:web:42a6028e0ff992afb50666"
});
const db = firebase.database();

const STATIONS = {
  s1:{num:1,name:'Station 01',cap:1},
  s2:{num:2,name:'Station 02',cap:1},
  s3:{num:3,name:'Poczekalnia',cap:10},
  s4:{num:4,name:'Station 04',cap:4},
  s5:{num:5,name:'Station 05',cap:4},
  s6:{num:6,name:'Station 06',cap:15},
  s7:{num:7,name:'Station 07',cap:30},
};

let pid = null;
let timerInterval = null;
let prevStatus = null;
let prevSid = null;

// ── INPUT HANDLING ────────────────────────────────────────────────────
document.getElementById('id-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});
document.getElementById('id-input').addEventListener('input', e => {
  e.target.value = e.target.value.toUpperCase();
});

// Auto-login from URL param
const urlId = new URLSearchParams(location.search).get('id');
if(urlId){
  document.getElementById('id-input').value = urlId.toUpperCase();
  setTimeout(doLogin, 400);
}

function doLogin(){
  const val = document.getElementById('id-input').value.trim().toUpperCase();
  if(!val) return;
  const errEl = document.getElementById('err');
  errEl.textContent = 'Łączenie...';

  db.ref('/participants/' + val).once('value').then(snap => {
    if(!snap.exists()){
      errEl.textContent = 'ID nieznane — zapytaj obsługę';
      return;
    }
    pid = val;
    errEl.textContent = '';
    // Subscribe to live updates
    db.ref('/participants/' + pid).on('value', snap => {
      if(snap.exists()) render(snap.val());
    });
  }).catch(() => {
    errEl.textContent = 'Brak połączenia — sprawdź internet';
  });
}

// ── RENDER ────────────────────────────────────────────────────────────
function render(data){
  const status = data.status;
  const sid = data.currentStation || data.transitTo;

  // Vibrate on status change
  if(status !== prevStatus && prevStatus !== null){
    if(status === 'transit')   vib([300,120,300,120,400]);
    if(status === 'active')    vib([100,50,100,50,200]);
    if(status === 'buffering') vib([200]);
    if(status === 'done')      vib([500,200,500]);
  }
  prevStatus = status;
  prevSid = sid;

  if(status === 'waiting_s3' || status === 's3_holding'){
    set('w-pid', data.id);
    set('w-tag', 'Ścieżka ' + data.path + ' · Poczekalnia');
    show('waiting'); return;
  }

  if(status === 'transit'){
    const dest = STATIONS[data.transitTo] || {};
    set('tr-pid', data.id);
    set('tr-num', dest.num || '?');
    set('tr-name', dest.name || '');
    set('tr-tag', 'Ścieżka ' + data.path + ' · Krok ' + (data.stepIndex||0) + '/6');
    startTimer(data.transitStartedAt, data.transitDur || 90);
    show('transit'); return;
  }

  if(status === 'buffering'){
    const s = STATIONS[data.currentStation] || {};
    set('bu-pid', data.id);
    set('bu-num', s.num || '?');
    set('bu-name', s.name || '');
    set('bu-tag', 'Ścieżka ' + data.path);
    show('buffering'); return;
  }

  if(status === 'active'){
    const s = STATIONS[data.currentStation] || {};
    set('ac-pid', data.id);
    set('ac-num', s.num || '?');
    set('ac-name', s.name || '');
    set('ac-msg', stMsg(s.cap || 1));
    set('ac-tag', 'Ścieżka ' + data.path + ' · Krok ' + (data.stepIndex||0) + '/6');
    show('active'); return;
  }

  if(status === 'done'){
    set('dn-pid', data.id);
    show('done'); return;
  }

  show('waiting');
}

function stMsg(cap){
  if(cap === 1) return 'Doświadczenie solo.';
  if(cap <= 4)  return 'Doświadczenie grupowe.';
  return 'Doświadczenie zbiorowe.';
}

// ── TRANSIT TIMER ─────────────────────────────────────────────────────
function startTimer(startedAt, dur){
  if(timerInterval) clearInterval(timerInterval);
  function tick(){
    const elapsed = startedAt ? Math.floor((Date.now() - startedAt) / 1000) : 0;
    const rem = Math.max(0, dur - elapsed);
    const pct = Math.min(100, (elapsed / dur) * 100);
    const m = Math.floor(rem/60), s = rem % 60;
    set('tr-timer', m + ':' + String(s).padStart(2,'0'));
    const fill = document.getElementById('tr-fill');
    if(fill) fill.style.width = pct + '%';
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

// ── HELPERS ───────────────────────────────────────────────────────────
function show(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  const el = document.getElementById('screen-' + name);
  if(el) el.classList.remove('hidden');
}
function set(id, val){
  const el = document.getElementById(id);
  if(el) el.textContent = val;
}
function vib(pattern){
  try { if('vibrate' in navigator) navigator.vibrate(pattern); } catch(e){}
}
</script>
</body>
</html>
