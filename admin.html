<!DOCTYPE html>
<html lang="en">
<head>

<title>GA — Admin</title>

<style>
:root{
  --bg:#080a0c;--bg2:#0e1116;--bg3:#141820;
  --line:#1e2840;--line2:#2a3850;
  --green:#00e87a;--gbg:rgba(0,232,122,.07);--gbr:rgba(0,232,122,.18);
  --red:#ff3c3c;--rbg:rgba(255,60,60,.07);
  --amber:#ffaa00;--abg:rgba(255,170,0,.07);
  --blue:#3d9eff;--bbg:rgba(61,158,255,.07);
  --purple:#a066ff;--pbg:rgba(160,102,255,.07);
  --text:#dde4ee;--t2:#7a8fa8;--t3:#3a4f68;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--green);text-transform:uppercase}
.logo em{color:var(--t3);font-style:normal}
.tabs{display:flex;gap:3px}
.tb{font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:5px 14px;border:1px solid transparent;border-radius:2px;cursor:pointer;text-transform:uppercase;transition:all .15s;background:transparent;color:var(--t3)}
.tb:hover{color:var(--t2);border-color:var(--line2)}.tb.on{color:var(--green);border-color:var(--green);background:var(--gbg)}
.page{padding:20px;max-width:1440px;margin:0 auto}
.panel{background:var(--bg2);border:1px solid var(--line);border-radius:4px;margin-bottom:14px}
.ph{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pt{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.pb{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.sc{background:var(--bg3);border:1px solid var(--line);border-radius:3px;padding:13px 15px}
.sl{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.sv{font-family:var(--mono);font-size:24px;font-weight:300;line-height:1}
.btn{font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:2px;cursor:pointer;border:1px solid;transition:all .12s;white-space:nowrap}
.bg{color:var(--green);border-color:var(--green);background:var(--gbg)}.bg:hover{background:var(--gbr)}.bg:disabled{opacity:.3;cursor:not-allowed}
.br{color:var(--red);border-color:var(--red);background:var(--rbg)}.br:hover{background:rgba(255,60,60,.14)}
.ba{color:var(--amber);border-color:var(--amber);background:var(--abg)}.ba:hover{background:rgba(255,170,0,.14)}
.bx{color:var(--t2);border-color:var(--line2);background:transparent}.bx:hover{color:var(--text);border-color:var(--t2)}
.sm{padding:4px 9px;font-size:8px}
input,select,textarea{background:var(--bg3);border:1px solid var(--line);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;width:100%;outline:none;transition:border-color .15s;resize:none}
input:focus,select:focus,textarea:focus{border-color:var(--green)}
label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:4px}
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:8px 11px;text-align:left;border-bottom:1px solid var(--line)}
.tbl td{padding:8px 11px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}.tbl tr:hover td{background:var(--bg3)}
.badge{display:inline-block;font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:2px}
.bg-g{color:var(--green);background:var(--gbg);border:1px solid rgba(0,232,122,.18)}
.bg-r{color:var(--red);background:var(--rbg);border:1px solid rgba(255,60,60,.18)}
.bg-a{color:var(--amber);background:var(--abg);border:1px solid rgba(255,170,0,.18)}
.bg-b{color:var(--blue);background:var(--bbg);border:1px solid rgba(61,158,255,.18)}
.bg-p{color:var(--purple);background:var(--pbg);border:1px solid rgba(160,102,255,.18)}
.bg-x{color:var(--t2);background:var(--bg3);border:1px solid var(--line)}
.scard{background:var(--bg3);border:1px solid var(--line);border-radius:4px;padding:11px}
.scard.act{border-color:var(--green);background:var(--gbg)}
.scard.full{border-color:var(--red);background:var(--rbg)}
.sname{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--t2);margin-bottom:3px;text-transform:uppercase}
.socc{font-family:var(--mono);font-size:22px;font-weight:300;line-height:1}
.scap{font-family:var(--mono);font-size:9px;color:var(--t3)}
.pbar{height:2px;background:var(--line);border-radius:1px;overflow:hidden;margin-top:7px}
.pfill{height:100%;border-radius:1px}
.tbar{height:2px;background:var(--line);border-radius:1px;overflow:hidden;margin-top:5px}
.tfill{height:100%;border-radius:1px}
.tlabel{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:2px;display:flex;justify-content:space-between}
.wslot{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:3px;margin-bottom:5px;gap:8px;flex-wrap:wrap}
.notif{padding:9px 12px;background:var(--bg3);border-left:2px solid var(--amber);border-radius:0 3px 3px 0;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.ntxt{font-family:var(--mono);font-size:9px;color:var(--t2);line-height:1.5}
/* INSTRUCTION PANEL */
.inst-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg3);border:1px solid var(--line);border-radius:3px;margin-bottom:5px;flex-wrap:wrap}
.inst-pid{font-family:var(--mono);font-size:10px;color:var(--text);min-width:80px}
.inst-status{font-family:var(--mono);font-size:9px;color:var(--t3)}
/* STATION INTERFACE */
.sif{min-height:100vh;background:#050709;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.sif-hd{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:#4a6a88;text-transform:uppercase;margin-bottom:36px;text-align:center}
.sif-name{font-family:var(--mono);font-size:28px;font-weight:300;color:#dde4ee;margin-bottom:3px;text-align:center}
.sif-cap{font-family:var(--mono);font-size:9px;color:#6a8aa8;text-align:center;letter-spacing:2px;margin-bottom:6px}
.sif-occ{font-family:var(--mono);font-size:48px;font-weight:300;text-align:center;margin:16px 0 3px}
.sif-timer{font-family:var(--mono);font-size:13px;text-align:center;letter-spacing:3px;margin-bottom:6px}
.sif-tbar{width:200px;height:2px;background:#1e3050;border-radius:1px;overflow:hidden;margin:0 auto 20px}
.sif-tfill{height:100%;border-radius:1px}
.sif-plist{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:22px;min-height:28px}
.sif-act{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.sif-btn{width:100%;padding:16px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s}
.sif-fn{color:#ff3c3c;border-color:#ff3c3c;background:rgba(255,60,60,.06)}.sif-fn:hover{background:rgba(255,60,60,.14)}.sif-fn:disabled{opacity:.3;cursor:not-allowed}
.sif-back{background:none;border:none;color:#4a6a88;font-family:var(--mono);font-size:8px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;margin-bottom:28px}
/* SCANNER */
.scanner-wrap{width:100%;max-width:280px;margin-bottom:16px}
.scanner-label{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:#4a6a88;text-transform:uppercase;margin-bottom:6px;text-align:center}
#scanner-video{width:100%;border-radius:4px;border:1px solid #1e3050;display:none;background:#000}
#scanner-result{font-family:var(--mono);font-size:10px;color:var(--green);text-align:center;margin-top:6px;min-height:16px}
/* TOASTS */
.toasts{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:10px 16px;background:var(--bg2);border:1px solid var(--line2);border-radius:3px;color:var(--t2);animation:tIn .25s ease}
.toast.ok{border-left:2px solid var(--green)}.toast.warn{border-left:2px solid var(--amber)}.toast.err{border-left:2px solid var(--red)}
@keyframes tIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-b{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.scroll{max-height:360px;overflow-y:auto}.dim{color:var(--t3);font-family:var(--mono);font-size:9px}
@media(max-width:800px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.g7{grid-template-columns:repeat(4,1fr)}.page{padding:12px}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

/* ── FIREBASE ──────────────────────────────────────────────────────── */
firebase.initializeApp({
  apiKey: "AIzaSyBzo6qVmam_u-H2asl3GIPRU_JBbMCPN9g",
  authDomain: "general-anesthesia-cf511.firebaseapp.com",
  databaseURL: "https://general-anesthesia-cf511-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "general-anesthesia-cf511",
  storageBucket: "general-anesthesia-cf511.firebasestorage.app",
  messagingSenderId: "839292271507",
  appId: "1:839292271507:web:42a6028e0ff992afb50666"
});
const fdb = firebase.database();

/* ── CONSTANTS ─────────────────────────────────────────────────────── */
const STATIONS = {
  s1:{id:'s1',num:1,name:'Station 01',cap:1,solo:true,dur:240},
  s2:{id:'s2',num:2,name:'Station 02',cap:1,solo:true,dur:300},
  s3:{id:'s3',num:3,name:'Waiting Room',cap:10,isWaiting:true,dur:0},
  s4:{id:'s4',num:4,name:'Station 04',cap:4,group:true,dur:240},
  s5:{id:'s5',num:5,name:'Station 05',cap:4,group:true,dur:240},
  s6:{id:'s6',num:6,name:'Station 06',cap:15,group:true,dur:360},
  s7:{id:'s7',num:7,name:'Station 07',cap:30,group:true,isFinal:true,dur:0},
};
const TRANSIT={'s3-s1':45,'s3-s2':45,'s3-s4':120,'s3-s5':120,'s1-s2':60,'s1-s6':120,'s2-s4':120,'s2-s5':120,'s4-s5':180,'s4-s6':120,'s5-s1':120,'s5-s6':120,'s6-s7':60};
const getT=(a,b)=>TRANSIT[`${a}-${b}`]||TRANSIT[`${b}-${a}`]||90;
const PATHS={
  A:{label:'A',seq:['s3','s1','s2','s4','s5','s6','s7'],badge:'bg-b'},
  B:{label:'B',seq:['s3','s4','s2','s5','s1','s6','s7'],badge:'bg-p'},
  C:{label:'C',seq:['s3','s5','s1','s2','s4','s6','s7'],badge:'bg-a'},
};
const assignPath=n=>n<=10?'A':n<=20?'B':'C';
const st=id=>STATIONS[id];
const now=()=>Date.now();
const fmtSec=s=>{s=Math.max(0,Math.round(s));const m=Math.floor(s/60),r=s%60;return`${m}:${String(r).padStart(2,'0')}`;};

function pathTimeToS6(k){const seq=PATHS[k].seq;let t=0;for(let i=1;i<seq.length;i++){const sid=seq[i];if(sid==='s7')break;t+=getT(seq[i-1],seq[i]);if(sid!=='s6')t+=STATIONS[sid].dur||0;if(sid==='s6')break;}return t;}
const PATH_TO_S6={A:pathTimeToS6('A'),B:pathTimeToS6('B'),C:pathTimeToS6('C')};
const MAX_S6=Math.max(...Object.values(PATH_TO_S6));
const BASE_DELAY={A:Math.round(MAX_S6-PATH_TO_S6.A),B:Math.round(MAX_S6-PATH_TO_S6.B),C:Math.round(MAX_S6-PATH_TO_S6.C)};

/* ── DB HELPERS ────────────────────────────────────────────────────── */
const dbSet=(path,val)=>fdb.ref(path).set(val);
const dbUpdate=(path,val)=>fdb.ref(path).update(val);
const dbGet=path=>fdb.ref(path).once('value').then(s=>s.val());

/* ── SEND INSTRUCTION ──────────────────────────────────────────────── */
async function sendInstruction(pid, text){
  await dbUpdate('/participants/'+pid, {instruction: text, instructionAt: now()});
}
async function broadcastInstruction(pids, text){
  for(const pid of pids) await sendInstruction(pid, text);
}

/* ── DISPATCH ENGINE ───────────────────────────────────────────────── */
async function dispatchFromS3(pid, forced=false){
  const p=await dbGet('/participants/'+pid);
  if(!p||(p.status!=='waiting_s3'&&p.status!=='s3_holding')) return;
  const path=PATHS[p.path], nextIdx=(p.stepIndex??0)+1;
  if(nextIdx>=path.seq.length) return;
  const fromSid='s3', toSid=path.seq[nextIdx], toSt=st(toSid), tDur=getT(fromSid,toSid);
  if(!forced){
    const earliest=(p.registeredAt||now())+BASE_DELAY[p.path]*1000;
    if(now()<earliest){
      await dbUpdate('/participants/'+pid,{status:'s3_holding',holdUntil:earliest});
      setTimeout(()=>dispatchFromS3(pid,true),earliest-now()+100);
      return;
    }
  }
  if(toSt.solo||toSt.cap===1){
    const soloFreeAt=(await dbGet('/soloFreeAt/'+toSid))||0;
    const arrivalTime=now()+tDur*1000;
    if(!forced&&arrivalTime<soloFreeAt-5000){
      await dbUpdate('/participants/'+pid,{status:'s3_holding',holdUntil:soloFreeAt-tDur*1000});
      setTimeout(()=>dispatchFromS3(pid,true),Math.max(100,soloFreeAt-tDur*1000-now()));
      return;
    }
    await dbSet('/soloFreeAt/'+toSid,arrivalTime+toSt.dur*1000);
  }
  const s3occ=(await dbGet('/occupancy/s3'))||0;
  await dbSet('/occupancy/s3',Math.max(0,s3occ-1));
  const instrText = toSt.isWaiting?'Stand by.':`Proceed to ${toSt.name}.`;
  await dbUpdate('/participants/'+pid,{
    status:'transit',transitStartedAt:now(),transitDur:tDur,transitTo:toSid,
    stepIndex:nextIdx,currentStation:null,stationStartedAt:null,stationCap:toSt.cap,
    holdUntil:null,instruction:instrText,instructionAt:now(),
  });
  setTimeout(()=>handleArrival(pid,toSid),tDur*1000+200);
}

async function handleArrival(pid, sid){
  const p=await dbGet('/participants/'+pid);
  if(!p||p.transitTo!==sid) return;
  const s=st(sid);
  const instrText=s.isFinal?'You have arrived.\nStay here.':s.group?`You are at ${s.name}.\nWait for your group.`:`You are at ${s.name}.`;
  if(s.group&&s.cap>1){
    await dbUpdate('/participants/'+pid,{status:'buffering',currentStation:sid,transitTo:null,transitStartedAt:null,transitDur:null,instruction:instrText,instructionAt:now()});
    const occNow=(await dbGet('/occupancy/'+sid))||0;
    await dbSet('/occupancy/'+sid,occNow+1);
    await checkGroupLaunch(sid);
  } else {
    const occNow=(await dbGet('/occupancy/'+sid))||0;
    await dbSet('/occupancy/'+sid,occNow+1);
    await dbUpdate('/participants/'+pid,{status:'active',currentStation:sid,transitTo:null,transitStartedAt:null,transitDur:null,stationStartedAt:now(),instruction:instrText,instructionAt:now()});
    if(s.dur>0) setTimeout(()=>addNotif(pid,`${pid} — time up · ${s.name}`,'warn'),s.dur*1000);
  }
}

async function checkGroupLaunch(sid){
  const s=st(sid);
  const allP=await dbGet('/participants')||{};
  const buffering=Object.values(allP).filter(p=>p.status==='buffering'&&p.currentStation===sid);
  const needed=sid==='s6'?15:sid==='s7'?30:s.cap;
  if(buffering.length>=needed){
    const group=buffering.slice(0,needed);
    const t=now();
    const instrText=`Session begins.\nYou are at ${s.name}.`;
    for(const p of group) await dbUpdate('/participants/'+p.id,{status:'active',stationStartedAt:t,instruction:instrText,instructionAt:t});
    if(s.dur>0) setTimeout(async()=>{for(const p of group) await addNotif(p.id,`${p.id} — time up · ${s.name}`,'warn');},s.dur*1000);
  }
}

async function advanceParticipant(pid){
  const p=await dbGet('/participants/'+pid);
  if(!p||p.status==='done') return;
  const path=PATHS[p.path], curIdx=p.stepIndex??0, nextIdx=curIdx+1;
  if(p.currentStation){const occ=(await dbGet('/occupancy/'+p.currentStation))||0;await dbSet('/occupancy/'+p.currentStation,Math.max(0,occ-1));}
  if(nextIdx>=path.seq.length){
    await dbUpdate('/participants/'+pid,{status:'done',currentStation:null,stationStartedAt:null,instruction:'Your experience has concluded.',instructionAt:now()});
    return;
  }
  const fromSid=path.seq[curIdx], toSid=path.seq[nextIdx], toSt=st(toSid), tDur=getT(fromSid,toSid);
  if(toSt.solo||toSt.cap===1){
    const soloFreeAt=(await dbGet('/soloFreeAt/'+toSid))||0;
    const arrivalTime=now()+tDur*1000;
    if(arrivalTime<soloFreeAt-5000){
      const s3occ=(await dbGet('/occupancy/s3'))||0;
      if(s3occ<10){
        await dbSet('/occupancy/s3',s3occ+1);
        await dbUpdate('/participants/'+pid,{status:'s3_holding',currentStation:'s3',stationStartedAt:null,stepIndex:curIdx,holdUntil:soloFreeAt-tDur*1000,transitTo:null,instruction:'Stand by.',instructionAt:now()});
        setTimeout(()=>dispatchFromS3(pid,true),Math.max(100,soloFreeAt-tDur*1000-now()));
        await addNotif(pid,`${pid} → Waiting Room (${toSt.name} busy)`,'warn');
        return;
      }
    }
    await dbSet('/soloFreeAt/'+toSid,now()+tDur*1000+toSt.dur*1000);
  }
  const instrText=`Proceed to ${toSt.name}.`;
  await dbUpdate('/participants/'+pid,{status:'transit',transitStartedAt:now(),transitDur:tDur,transitTo:toSid,stepIndex:nextIdx,currentStation:null,stationStartedAt:null,stationCap:toSt.cap,instruction:instrText,instructionAt:now()});
  setTimeout(()=>handleArrival(pid,toSid),tDur*1000+200);
}

async function addNotif(pid,msg,type='info'){
  await fdb.ref('/notifications/'+now()+Math.random()).set({pid,msg,time:now(),type});
}

/* ── HOOKS ─────────────────────────────────────────────────────────── */
function useFirebase(path){
  const [val,setVal]=useState(null);
  useEffect(()=>{const ref=fdb.ref(path);ref.on('value',snap=>setVal(snap.val()));return()=>ref.off();},[path]);
  return val;
}
function useToast(){
  const [ts,setTs]=useState([]);
  const add=useCallback((msg,type='ok')=>{const id=now();setTs(t=>[...t,{id,msg,type}]);setTimeout(()=>setTs(t=>t.filter(x=>x.id!==id)),3400);},[]);
  return{ts,add};
}

/* ── TIMER BAR ─────────────────────────────────────────────────────── */
function TimerBar({startedAt,dur}){
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);
  if(!startedAt||!dur) return null;
  const el=Math.floor((now()-startedAt)/1000),pct=Math.min(100,(el/dur)*100),rem=Math.max(0,dur-el),over=el>dur;
  const col=over?'var(--red)':pct>80?'var(--amber)':'var(--green)';
  return(<div><div className="tbar"><div className="tfill" style={{width:pct+'%',background:col}}/></div><div className="tlabel"><span style={{color:col}}>{over?'+':''}{fmtSec(el)}</span><span style={{color:rem<30?'var(--red)':undefined}}>{fmtSec(rem)}</span></div></div>);
}

/* ════════════════════════════════════════════════════════════════════
   APP
════════════════════════════════════════════════════════════════════ */
function App(){
  const [view,setView]=useState('admin');
  const toast=useToast();
  return(
    <div>
      <div className="toasts">{toast.ts.map(t=><div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}</div>
      <nav className="nav">
        <div className="logo">General<em>/</em>Anesthesia<em> — </em>Flow</div>
        <div className="tabs">
          <button className={`tb ${view==='admin'?'on':''}`} onClick={()=>setView('admin')}>Admin</button>
          <button className={`tb ${view==='station'?'on':''}`} onClick={()=>setView('station')}>Station</button>
        </div>
      </nav>
      {view==='admin'&&<AdminDashboard toast={toast}/>}
      {view==='station'&&<StationInterface toast={toast}/>}
    </div>
  );
}

/* ── ADMIN DASHBOARD ───────────────────────────────────────────────── */
function AdminDashboard({toast}){
  const [tab,setTab]=useState('overview');
  const [regId,setRegId]=useState('');
  const [broadcastMsg,setBroadcastMsg]=useState('');
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);

  const participants=useFirebase('/participants')||{};
  const occupancy=useFirebase('/occupancy')||{};
  const notifications=useFirebase('/notifications')||{};
  const showStarted=useFirebase('/showStarted');

  const pList=Object.values(participants);
  const notifList=Object.values(notifications).filter(Boolean).sort((a,b)=>b.time-a.time);

  const register=async()=>{
    const id=regId.trim().toUpperCase();
    if(!id){toast.add('Enter ID','err');return;}
    if(participants[id]){toast.add(`${id} already exists`,'warn');return;}
    if(pList.length>=30){toast.add('Max 30 participants','err');return;}
    const num=pList.length+1, path=assignPath(num);
    await dbSet('/participants/'+id,{
      id,num,path,status:'waiting_s3',currentStation:'s3',stepIndex:0,
      registeredAt:now(),stationStartedAt:null,transitStartedAt:null,
      transitDur:null,transitTo:null,holdUntil:null,stationCap:null,
      instruction:'Stand by.',instructionAt:now(),
    });
    const s3occ=(await dbGet('/occupancy/s3'))||0;
    await dbSet('/occupancy/s3',s3occ+1);
    toast.add(`${id} registered → Path ${path}`,'ok');
    setRegId('');
  };

  const doBroadcast=async()=>{
    if(!broadcastMsg.trim()){toast.add('Enter message','err');return;}
    await broadcastInstruction(pList.map(p=>p.id), broadcastMsg.trim());
    toast.add(`Broadcast sent to ${pList.length} participants`,'ok');
    setBroadcastMsg('');
  };

  const clearNotif=nid=>fdb.ref('/notifications/'+nid).remove();
  const finishAndAdvance=async(pid)=>{await advanceParticipant(pid);toast.add(`${pid} → next`,'ok');};
  const startShow=async()=>{await dbSet('/showStarted',true);await dbSet('/showStartAt',now());toast.add('Show started','ok');};

  const removeParticipant=async(pid)=>{
    if(!window.confirm(`Remove ${pid}? This cannot be undone.`)) return;
    const p=participants[pid];
    if(p?.currentStation){
      const occ=(await dbGet('/occupancy/'+p.currentStation))||0;
      await dbSet('/occupancy/'+p.currentStation,Math.max(0,occ-1));
    }
    await fdb.ref('/participants/'+pid).remove();
    const notifs=await dbGet('/notifications')||{};
    for(const [nid,n] of Object.entries(notifs)){
      if(n?.pid===pid) await fdb.ref('/notifications/'+nid).remove();
    }
    toast.add(`${pid} removed`,'ok');
  };

  const active=pList.filter(p=>p.status==='active').length;
  const inTransit=pList.filter(p=>p.status==='transit').length;
  const waiting=pList.filter(p=>p.status==='waiting_s3'||p.status==='s3_holding'||p.status==='buffering').length;

  return(
    <div className="page">
      <div className="row-b mb20">
        <div><div className="dim mb8">Control Room · Firebase Live</div><div style={{fontFamily:'var(--mono)',fontSize:18,fontWeight:300}}>Master Dashboard</div></div>
        <div className="row">
          {!showStarted&&<button className="btn bg" onClick={startShow}>▶ Start Show</button>}
          {showStarted&&<span className="badge bg-g">LIVE</span>}
        </div>
      </div>
      <div className="g4 mb16">
        <div className="sc"><div className="sl">Registered</div><div className="sv">{pList.length}<span style={{fontSize:13,color:'var(--t3)'}}>/30</span></div></div>
        <div className="sc"><div className="sl">At stations</div><div className="sv" style={{color:'var(--green)'}}>{active}</div></div>
        <div className="sc"><div className="sl">In transit</div><div className="sv" style={{color:'var(--blue)'}}>{inTransit}</div></div>
        <div className="sc"><div className="sl">Waiting</div><div className="sv" style={{color:'var(--amber)'}}>{waiting}</div></div>
      </div>
      <div className="row mb16">
        {['overview','instructions','participants'].map(t=>(
          <button key={t} className={`tb ${tab===t?'on':''}`} onClick={()=>setTab(t)}>{t}</button>
        ))}
      </div>
      {tab==='overview'&&<OverviewTab pList={pList} occupancy={occupancy} notifList={notifList} finishAndAdvance={finishAndAdvance} clearNotif={clearNotif} regId={regId} setRegId={setRegId} register={register} broadcastMsg={broadcastMsg} setBroadcastMsg={setBroadcastMsg} doBroadcast={doBroadcast} removeParticipant={removeParticipant} toast={toast}/>}
      {tab==='instructions'&&<InstructionsTab pList={pList} toast={toast}/>}
      {tab==='participants'&&<ParticipantsTab pList={pList} finishAndAdvance={finishAndAdvance} removeParticipant={removeParticipant} toast={toast}/>}
    </div>
  );
}

/* ── OVERVIEW TAB ──────────────────────────────────────────────────── */
function OverviewTab({pList,occupancy,notifList,finishAndAdvance,clearNotif,regId,setRegId,register,broadcastMsg,setBroadcastMsg,doBroadcast,removeParticipant,toast}){
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);
  const s3ppl=pList.filter(p=>p.status==='waiting_s3'||p.status==='s3_holding');
  return(
    <div className="g2">
      <div>
        {/* STATION MAP */}
        <div className="panel mb14">
          <div className="ph"><span className="pt">Stations · live</span></div>
          <div className="pb">
            <div className="g7">
              {Object.values(STATIONS).map(station=>{
                const occ=occupancy[station.id]||0;
                const buffering=pList.filter(p=>p.status==='buffering'&&p.currentStation===station.id).length;
                const full=occ>=station.cap;
                const stPpl=pList.filter(p=>p.currentStation===station.id&&p.status==='active');
                return(
                  <div key={station.id} className={`scard ${full?'full':occ>0?'act':''}`}>
                    <div className="sname">S{station.num}</div>
                    <div className="socc" style={{color:full?'var(--red)':occ>0?'var(--green)':'var(--t3)'}}>{occ}</div>
                    <div className="scap">/{station.cap}</div>
                    {buffering>0&&<div style={{fontFamily:'var(--mono)',fontSize:8,color:'var(--amber)',marginTop:2}}>{buffering}⏳</div>}
                    <div className="pbar"><div className="pfill" style={{width:`${Math.min(100,(occ/station.cap)*100)}%`,background:full?'var(--red)':'var(--green)'}}/></div>
                    {stPpl[0]?.stationStartedAt&&station.dur>0&&<TimerBar startedAt={stPpl[0].stationStartedAt} dur={station.dur}/>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* WAITING ROOM */}
        <div className="panel mb14">
          <div className="ph"><span className="pt">Waiting Room ({s3ppl.length}/10)</span><span className="dim">delays A:{fmtSec(BASE_DELAY.A)} B:{fmtSec(BASE_DELAY.B)} C:{fmtSec(BASE_DELAY.C)}</span></div>
          <div className="pb">
            {s3ppl.length===0&&<div className="dim" style={{textAlign:'center',padding:'10px 0'}}>Empty</div>}
            {s3ppl.map(p=>{
              const path=PATHS[p.path];
              const nextSid=path.seq[(p.stepIndex??0)+1];
              const nextSt=nextSid?st(nextSid):null;
              const isHolding=p.status==='s3_holding';
              const rem=isHolding&&p.holdUntil?Math.max(0,Math.round((p.holdUntil-now())/1000)):0;
              return(
                <div key={p.id} className="wslot">
                  <div className="row">
                    <span style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text)'}}>{p.id}</span>
                    <span className={`badge ${path.badge}`}>{p.path}</span>
                    {nextSt&&<span className="dim">→{nextSt.name}</span>}
                    {isHolding&&rem>0&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)'}}>⏳{fmtSec(rem)}</span>}
                  </div>
                  <div className="row" style={{gap:4}}>
                    {isHolding
                      ?<button className="btn ba sm" onClick={()=>{dispatchFromS3(p.id,true);toast.add(p.id+' forced','ok');}}>Force →</button>
                      :<button className="btn bg sm" onClick={()=>{dispatchFromS3(p.id);toast.add(p.id+' dispatched','ok');}}>Send →</button>
                    }
                    <button className="btn br sm" onClick={()=>removeParticipant(p.id)}>✕</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* GROUP BUFFERS */}
        {['s4','s5','s6','s7'].map(sid=>{
          const s_=st(sid);
          const buffering=pList.filter(p=>p.status==='buffering'&&p.currentStation===sid);
          const inTransit=pList.filter(p=>p.status==='transit'&&p.transitTo===sid);
          if(buffering.length===0&&inTransit.length===0) return null;
          const needed=sid==='s6'?15:sid==='s7'?30:s_.cap;
          return(
            <div key={sid} className="panel mb14" style={{borderColor:'rgba(255,170,0,.25)'}}>
              <div className="ph"><span className="pt" style={{color:'var(--amber)'}}>{s_.name} · {buffering.length}/{needed}</span><span className="dim">{inTransit.length} in transit</span></div>
              <div className="pb">
                <div className="row" style={{gap:5,flexWrap:'wrap',marginBottom:6}}>
                  {buffering.map(p=><span key={p.id} className="badge bg-g">{p.id} ✓</span>)}
                  {inTransit.map(p=><span key={p.id} className="badge bg-a">{p.id} ✈</span>)}
                  {Array.from({length:Math.max(0,needed-buffering.length-inTransit.length)}).map((_,i)=><span key={i} className="badge bg-x">—</span>)}
                </div>
                <div className="dim">Need {Math.max(0,needed-buffering.length-inTransit.length)} more</div>
              </div>
            </div>
          );
        })}
      </div>

      <div>
        {/* REGISTER */}
        <div className="panel mb14">
          <div className="ph"><span className="pt">Register Participant</span></div>
          <div className="pb">
            <div className="mb8">
              <label>Participant ID</label>
              <div className="row">
                <input value={regId} onChange={e=>setRegId(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&register()} placeholder="e.g. WOLF7" maxLength={16}/>
                <button className="btn bg" onClick={register}>+ Add</button>
              </div>
            </div>
            <div className="dim">Path A: 1–10 · B: 11–20 · C: 21–30</div>
          </div>
        </div>

        {/* BROADCAST */}
        <div className="panel mb14">
          <div className="ph"><span className="pt">Broadcast Instruction</span><span className="dim">→ all participants</span></div>
          <div className="pb">
            <textarea rows={3} value={broadcastMsg} onChange={e=>setBroadcastMsg(e.target.value)} placeholder="e.g. Please remain where you are." style={{marginBottom:8}}/>
            <button className="btn bg" style={{width:'100%'}} onClick={doBroadcast}>Send to All →</button>
          </div>
        </div>

        {/* NOTIFICATIONS */}
        <div className="panel">
          <div className="ph">
            <span className="pt" style={{color:notifList.some(n=>n.type==='warn')?'var(--amber)':undefined}}>
              Notifications {notifList.length>0&&`(${notifList.length})`}
            </span>
            {notifList.length>0&&<button className="btn bx sm" onClick={()=>fdb.ref('/notifications').remove()}>Clear</button>}
          </div>
          <div className="pb scroll">
            {notifList.length===0&&<div className="dim" style={{textAlign:'center',padding:'12px 0'}}>None</div>}
            {notifList.map(n=>(
              <div key={n.id} className="notif">
                <div><div className="ntxt">{n.msg}</div><div className="dim">{new Date(n.time).toLocaleTimeString('en')}</div></div>
                <div className="row" style={{gap:5}}>
                  {n.type==='warn'&&n.pid&&<button className="btn bg sm" onClick={()=>{finishAndAdvance(n.pid);clearNotif(n.id);}}>→ Next</button>}
                  <button className="btn bx sm" onClick={()=>clearNotif(n.id)}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── INSTRUCTIONS TAB ──────────────────────────────────────────────── */
function InstructionsTab({pList,toast}){
  const [instructions,setInstructions]=useState({});
  const sorted=[...pList].sort((a,b)=>a.num-b.num);

  const send=async(pid)=>{
    const txt=(instructions[pid]||'').trim();
    if(!txt){toast.add('Enter instruction','err');return;}
    await sendInstruction(pid,txt);
    toast.add(`Sent to ${pid}`,'ok');
    setInstructions(prev=>({...prev,[pid]:''}));
  };

  return(
    <div>
      <div className="panel">
        <div className="ph"><span className="pt">Send Instructions — Individual</span><span className="dim">triggers vibration immediately</span></div>
        <div className="pb scroll">
          {sorted.length===0&&<div className="dim" style={{textAlign:'center',padding:'16px 0'}}>No participants registered</div>}
          {sorted.map(p=>{
            const sBadge={active:'bg-g',waiting_s3:'bg-a',s3_holding:'bg-a',transit:'bg-b',buffering:'bg-p',done:'bg-x'};
            const curSt=p.currentStation?st(p.currentStation):null;
            const destSt=p.transitTo?st(p.transitTo):null;
            return(
              <div key={p.id} className="inst-row">
                <div style={{minWidth:70}}>
                  <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text)',marginBottom:2}}>{p.id}</div>
                  <div className="row" style={{gap:4}}>
                    <span className={`badge ${PATHS[p.path].badge}`}>{p.path}</span>
                    <span className={`badge ${sBadge[p.status]||'bg-x'}`} style={{fontSize:7}}>{p.status.replace('_',' ')}</span>
                  </div>
                </div>
                <div style={{flex:1,fontFamily:'var(--mono)',fontSize:9,color:'var(--t3)'}}>
                  {curSt?curSt.name:destSt?`→ ${destSt.name}`:'—'}
                  {p.instruction&&<div style={{color:'var(--t2)',marginTop:2,fontSize:8}}>"{p.instruction.substring(0,40)}{p.instruction.length>40?'...':''}"</div>}
                </div>
                <div className="row" style={{gap:6,minWidth:200}}>
                  <input
                    value={instructions[p.id]||''}
                    onChange={e=>setInstructions(prev=>({...prev,[p.id]:e.target.value}))}
                    onKeyDown={e=>e.key==='Enter'&&send(p.id)}
                    placeholder="Type instruction..."
                    style={{fontSize:10,padding:'5px 8px'}}
                  />
                  <button className="btn bg sm" onClick={()=>send(p.id)}>Send</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ── PARTICIPANTS TAB ──────────────────────────────────────────────── */
function ParticipantsTab({pList,finishAndAdvance,removeParticipant,toast}){
  const [filter,setFilter]=useState('all');
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);
  const filtered=pList.filter(p=>filter==='all'||p.status===filter||p.path===filter);
  const sorted=[...filtered].sort((a,b)=>a.num-b.num);
  const sBadge={active:'bg-g',waiting_s3:'bg-a',s3_holding:'bg-a',transit:'bg-b',buffering:'bg-p',done:'bg-x'};
  const sLabel={active:'active',waiting_s3:'waiting',s3_holding:'holding',transit:'transit',buffering:'buffering',done:'done'};
  return(
    <div>
      <div className="row-b mb12">
        <div className="row" style={{gap:3}}>
          {['all','active','transit','waiting_s3','buffering','done','A','B','C'].map(f=>(
            <button key={f} className={`tb ${filter===f?'on':''}`} onClick={()=>setFilter(f)} style={{fontSize:8,padding:'3px 9px'}}>
              {f==='waiting_s3'?'waiting':f==='all'?'all':f}
            </button>
          ))}
        </div>
        <span className="dim">{filtered.length}</span>
      </div>
      <div className="panel"><div className="scroll">
        <table className="tbl">
          <thead><tr><th>ID</th><th>#</th><th>Path</th><th>Status</th><th>Location</th><th>Step</th><th>Timer</th><th>Transit</th><th>Last instruction</th><th>Action</th></tr></thead>
          <tbody>
            {sorted.map(p=>{
              const path=PATHS[p.path];
              const curSt=p.currentStation?st(p.currentStation):null;
              const el=p.stationStartedAt?Math.floor((now()-p.stationStartedAt)/1000):0;
              const dur=curSt?.dur||0; const over=dur>0&&el>dur;
              const trEl=p.transitStartedAt?Math.floor((now()-p.transitStartedAt)/1000):0;
              const trRem=Math.max(0,(p.transitDur||0)-trEl);
              const destSt=p.transitTo?st(p.transitTo):null;
              const holdRem=p.holdUntil?Math.max(0,Math.round((p.holdUntil-now())/1000)):0;
              return(
                <tr key={p.id}>
                  <td style={{color:'var(--text)',fontWeight:500}}>{p.id}</td>
                  <td className="dim">{p.num}</td>
                  <td><span className={`badge ${path.badge}`}>{p.path}</span></td>
                  <td><span className={`badge ${sBadge[p.status]||'bg-x'}`}>{sLabel[p.status]||p.status}</span></td>
                  <td style={{color:'var(--t2)',fontSize:9}}>{curSt&&!curSt.isWaiting?curSt.name:destSt?`→${destSt.name}`:curSt?.name||'—'}</td>
                  <td className="dim">{p.stepIndex??0}/{path.seq.length-1}</td>
                  <td>{p.status==='active'&&dur>0&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:over?'var(--red)':'var(--green)'}}>{over?'+':''}{fmtSec(el)}/{fmtSec(dur)}</span>}</td>
                  <td>
                    {p.status==='transit'&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--blue)'}}>✈ {fmtSec(trRem)}</span>}
                    {p.status==='s3_holding'&&holdRem>0&&<span style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--amber)'}}>⏳{fmtSec(holdRem)}</span>}
                  </td>
                  <td style={{color:'var(--t3)',fontSize:9,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.instruction||'—'}</td>
                  <td>
                    <div className="row" style={{gap:4}}>
                      {p.status==='waiting_s3'&&<button className="btn bg sm" onClick={()=>{dispatchFromS3(p.id);toast.add(p.id,'ok');}}>Send</button>}
                      {p.status==='s3_holding'&&<button className="btn ba sm" onClick={()=>{dispatchFromS3(p.id,true);toast.add(p.id+' forced','ok');}}>Force</button>}
                      {p.status==='active'&&<button className="btn ba sm" onClick={()=>finishAndAdvance(p.id)}>End →</button>}
                      <button className="btn br sm" onClick={()=>removeParticipant(p.id)} title="Remove participant">✕</button>
                    </div>
                  </td>
                </tr>
              );
            })}
            {sorted.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:'20px',color:'var(--t3)'}}>No participants</td></tr>}
          </tbody>
        </table>
      </div></div>
    </div>
  );
}

/* ── STATION INTERFACE ─────────────────────────────────────────────── */
function StationInterface({toast}){
  const [sel,setSel]=useState(null);
  const [scannedId,setScannedId]=useState('');
  const [scanning,setScanning]=useState(false);
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);
  const videoRef=useRef(null);
  const streamRef=useRef(null);

  const occupancy=useFirebase('/occupancy')||{};
  const participants=useFirebase('/participants')||{};
  const pList=Object.values(participants);

  // QR Scanner via camera
  const startScan=async()=>{
    setScanning(true);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      streamRef.current=stream;
      if(videoRef.current){ videoRef.current.srcObject=stream; videoRef.current.play(); videoRef.current.style.display='block';}
      // Use BarcodeDetector if available
      if('BarcodeDetector' in window){
        const detector=new BarcodeDetector({formats:['qr_code']});
        const scan=async()=>{
          if(!scanning) return;
          try{
            const barcodes=await detector.detect(videoRef.current);
            if(barcodes.length>0){
              const raw=barcodes[0].rawValue;
              const id=raw.trim().toUpperCase();
              setScannedId(id);
              toast.add('Scanned: '+id,'ok');
              stopScan();
            } else { requestAnimationFrame(scan); }
          }catch(e){ requestAnimationFrame(scan); }
        };
        requestAnimationFrame(scan);
      }
    }catch(e){ toast.add('Camera access denied','err'); setScanning(false); }
  };

  const stopScan=()=>{
    setScanning(false);
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    if(videoRef.current){videoRef.current.style.display='none';}
  };

  useEffect(()=>()=>stopScan(),[]);

  if(!sel){
    return(
      <div className="sif">
        <div className="sif-hd">Select your station</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:9,maxWidth:520,width:'100%'}}>
          {Object.values(STATIONS).filter(x=>!x.isWaiting).map(station=>{
            const occ=occupancy[station.id]||0; const full=occ>=station.cap;
            return(
              <button key={station.id} onClick={()=>setSel(station.id)} style={{background:'var(--bg3)',border:`1px solid ${full?'var(--red)':occ>0?'var(--green)':'var(--line)'}`,borderRadius:4,padding:16,cursor:'pointer',fontFamily:'var(--mono)',color:'var(--text)',textAlign:'center'}}>
                <div style={{fontSize:8,color:'var(--t2)',marginBottom:5,letterSpacing:2,textTransform:'uppercase'}}>{station.name}</div>
                <div style={{fontSize:26,color:full?'var(--red)':occ>0?'var(--green)':'var(--t3)',fontWeight:300}}>{occ}</div>
                <div style={{fontSize:8,color:'var(--t3)'}}>/{station.cap}</div>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  const station=STATIONS[sel];
  const occ=occupancy[sel]||0; const full=occ>=station.cap;
  const stPpl=pList.filter(p=>p.currentStation===sel&&(p.status==='active'||p.status==='buffering'));
  const elapsed=stPpl[0]?.stationStartedAt?Math.floor((now()-stPpl[0].stationStartedAt)/1000):0;
  const pct=station.dur>0?Math.min(100,(elapsed/station.dur)*100):0;
  const over=station.dur>0&&elapsed>station.dur;

  const endSession=async()=>{
    const activePpl=stPpl.filter(p=>p.status==='active');
    if(activePpl.length===0){toast.add('No one here','err');return;}
    for(const p of activePpl) await addNotif(p.id,`${p.id} finished ${station.name}`,'warn');
    if('vibrate' in navigator) navigator.vibrate([200,100,200]);
    toast.add('Admin notified','ok');
  };

  return(
    <div className="sif">
      <button className="sif-back" onClick={()=>{stopScan();setSel(null);}}>← Change station</button>
      <div className="sif-hd">Performer Interface</div>
      <div className="sif-name">{station.name}</div>
      <div className="sif-cap">{station.cap===1?'solo':station.isFinal?`finale ${station.cap}`:`group ${station.cap}`}</div>
      <div className="sif-occ" style={{color:full?'var(--red)':occ>0?'var(--green)':'var(--t3)'}}>{occ}</div>
      {station.dur>0&&stPpl.length>0&&(
        <>
          <div className="sif-timer" style={{color:over?'var(--red)':pct>80?'var(--amber)':'var(--green)'}}>{over?'+':''}{fmtSec(elapsed)} / {fmtSec(station.dur)}</div>
          <div className="sif-tbar"><div className="sif-tfill" style={{width:pct+'%',background:over?'var(--red)':pct>80?'var(--amber)':'var(--green)'}}/></div>
        </>
      )}
      <div className="sif-plist">
        {stPpl.map(p=><span key={p.id} className="badge bg-g">{p.id}</span>)}
        {stPpl.length===0&&<span className="dim">no participants</span>}
      </div>

      {/* QR SCANNER */}
      <div className="scanner-wrap">
        <div className="scanner-label">Scan participant QR</div>
        <video ref={videoRef} style={{display:'none',width:'100%',borderRadius:4,border:'1px solid #1e3050'}} playsInline muted/>
        {scannedId&&<div style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--green)',textAlign:'center',marginTop:6,letterSpacing:2}}>{scannedId} ✓</div>}
        <div className="row" style={{gap:6,marginTop:8}}>
          {!scanning
            ?<button className="btn bg" style={{flex:1}} onClick={startScan}>📷 Scan QR</button>
            :<button className="btn br" style={{flex:1}} onClick={stopScan}>Stop scan</button>
          }
          <input
            style={{flex:1,padding:'6px 8px',fontSize:10}}
            placeholder="or type ID"
            value={scannedId}
            onChange={e=>setScannedId(e.target.value.toUpperCase())}
            onKeyDown={e=>e.key==='Enter'&&toast.add('ID: '+scannedId,'ok')}
          />
        </div>
      </div>

      <div className="sif-act">
        <button className="sif-btn sif-fn" onClick={endSession} disabled={occ===0}>
          ✕ End session · Notify admin
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
