<style>
:root{
  --bg:#080a0c;--bg2:#0e1116;--bg3:#141820;
  --line:#1e2840;--line2:#2a3850;
  --green:#00e87a;--gbg:rgba(0,232,122,.07);--gbr:rgba(0,232,122,.18);
  --red:#ff3c3c;--rbg:rgba(255,60,60,.07);
  --amber:#ffaa00;--abg:rgba(255,170,0,.07);
  --blue:#3d9eff;--bbg:rgba(61,158,255,.07);
  --purple:#a066ff;--pbg:rgba(160,102,255,.07);
  --text:#dde4ee;--t2:#7a8fa8;--t3:#3a4f68;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:100}
.logo{font-family:var(--mono);font-size:10px;letter-spacing:3px;color:var(--green);text-transform:uppercase}
.logo em{color:var(--t3);font-style:normal}
.tabs{display:flex;gap:3px}
.tb{font-family:var(--mono);font-size:9px;letter-spacing:2px;padding:5px 14px;border:1px solid transparent;border-radius:2px;cursor:pointer;text-transform:uppercase;transition:all .15s;background:transparent;color:var(--t3)}
.tb:hover{color:var(--t2);border-color:var(--line2)}.tb.on{color:var(--green);border-color:var(--green);background:var(--gbg)}
.page{padding:20px;max-width:1440px;margin:0 auto}
.panel{background:var(--bg2);border:1px solid var(--line);border-radius:4px;margin-bottom:14px}
.ph{padding:11px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.pt{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.pb{padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g7{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.sc{background:var(--bg3);border:1px solid var(--line);border-radius:3px;padding:13px 15px}
.sl{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.sv{font-family:var(--mono);font-size:24px;font-weight:300;line-height:1}
.ss{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px}

.bg{color:var(--green);border-color:var(--green);background:var(--gbg)}.bg:hover{background:var(--gbr)}.bg:disabled{opacity:.3;cursor:not-allowed}

.ba{color:var(--amber);border-color:var(--amber);background:var(--abg)}.ba:hover{background:rgba(255,170,0,.14)}
.bx{color:var(--t2);border-color:var(--line2);background:transparent}.bx:hover{color:var(--text);border-color:var(--t2)}
.sm{padding:4px 9px;font-size:8px}
input,select{background:var(--bg3);border:1px solid var(--line);border-radius:2px;color:var(--text);font-family:var(--mono);font-size:11px;padding:7px 10px;width:100%;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--green)}
label{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);display:block;margin-bottom:4px}
.tbl{width:100%;border-collapse:collapse}

/* STATION INTERFACE */
.sif{min-height:100vh;background:#050709;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.sif-hd{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:#1a2535;text-transform:uppercase;margin-bottom:36px;text-align:center}

.sif-occ{font-family:var(--mono);font-size:48px;font-weight:300;text-align:center;margin:16px 0 3px}
.sif-timer{font-family:var(--mono);font-size:13px;text-align:center;letter-spacing:3px;margin-bottom:6px}
.sif-tbar{width:200px;height:2px;background:#0e1822;border-radius:1px;overflow:hidden;margin:0 auto 20px}
.sif-tfill{height:100%;border-radius:1px}
.sif-plist{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:22px;min-height:28px}
.sif-act{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.sif-btn{width:100%;padding:16px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;border-radius:3px;cursor:pointer;border:1px solid;transition:all .15s}
.sif-fn{color:#ff3c3c;border-color:#ff3c3c;background:rgba(255,60,60,.06)}.sif-fn:hover{background:rgba(255,60,60,.14)}.sif-fn:disabled{opacity:.3;cursor:not-allowed}
.sif-back{background:none;border:none;color:#1a2535;font-family:var(--mono);font-size:8px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;margin-bottom:28px}
/* QR MODAL */
.qr-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:24px}
.qr-box{background:var(--bg2);border:1px solid var(--line2);border-radius:6px;padding:28px;text-align:center;max-width:300px;width:100%}
.qr-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t2);margin-bottom:16px}
.qr-id{font-family:var(--mono);font-size:16px;letter-spacing:4px;color:var(--green);margin-top:16px}
.qr-url{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:6px;word-break:break-all;line-height:1.4}
/* SCANNER AREA */
.scanner-area{background:var(--bg3);border:1px solid var(--line);border-radius:4px;padding:20px;text-align:center;margin-bottom:14px}
.scan-result{font-family:var(--mono);font-size:11px;color:var(--green);margin-top:10px;min-height:18px}
/* TOASTS */
.toasts{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:10px 16px;background:var(--bg2);border:1px solid var(--line2);border-radius:3px;color:var(--t2);animation:tIn .25s ease}
.toast.ok{border-left:2px solid var(--green)}.toast.warn{border-left:2px solid var(--amber)}.toast.err{border-left:2px solid var(--red)}
@keyframes tIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.row-b{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.scroll{max-height:360px;overflow-y:auto}.dim{color:var(--t3);font-family:var(--mono);font-size:9px}
@media(max-width:800px){.g4{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}.g7{grid-template-columns:repeat(4,1fr)}.page{padding:12px}}

<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;

/* ── FIREBASE ──────────────────────────────────────────────────────── */
firebase.initializeApp({
  apiKey: "AIzaSyBzo6qVmam_u-H2asl3GIPRU_JBbMCPN9g",
  authDomain: "general-anesthesia-cf511.firebaseapp.com",
  databaseURL: "https://general-anesthesia-cf511-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "general-anesthesia-cf511",
  storageBucket: "general-anesthesia-cf511.firebasestorage.app",
  messagingSenderId: "839292271507",
  appId: "1:839292271507:web:42a6028e0ff992afb50666"
});
const fdb = firebase.database();

/* ── CONSTANTS ─────────────────────────────────────────────────────── */
const PARTICIPANT_URL = 'https://YOUR-GITHUB.github.io/ga-flow/participant.html';
// ↑ Change this to your actual GitHub Pages URL after deploying

const STATIONS = {
  s1:{id:'s1',num:1,name:'Station 01',cap:1, solo:true, dur:240},
  s2:{id:'s2',num:2,name:'Station 02',cap:1, solo:true, dur:300},
  s3:{id:'s3',num:3,name:'Poczekalnia',cap:10,isWaiting:true,dur:0},
  s4:{id:'s4',num:4,name:'Station 04',cap:4, group:true,dur:240},
  s5:{id:'s5',num:5,name:'Station 05',cap:4, group:true,dur:240},
  s6:{id:'s6',num:6,name:'Station 06',cap:15,group:true,dur:360},
  s7:{id:'s7',num:7,name:'Station 07',cap:30,group:true,isFinal:true,dur:0},
};
const TRANSIT={
  's3-s1':45,'s3-s2':45,'s3-s4':120,'s3-s5':120,
  's1-s2':60,'s1-s6':120,'s2-s4':120,'s2-s5':120,
  's4-s5':180,'s4-s6':120,'s5-s1':120,'s5-s6':120,'s6-s7':60,
};
const getT=(a,b)=>TRANSIT[`${a}-${b}`]||TRANSIT[`${b}-${a}`]||90;
const PATHS={
  A:{label:'A',seq:['s3','s1','s2','s4','s5','s6','s7'],badge:'bg-b'},
  B:{label:'B',seq:['s3','s4','s2','s5','s1','s6','s7'],badge:'bg-p'},
  C:{label:'C',seq:['s3','s5','s1','s2','s4','s6','s7'],badge:'bg-a'},
};
const assignPath=n=>n<=10?'A':n<=20?'B':'C';
const st=id=>STATIONS[id];
const now=()=>Date.now();
const fmtSec=s=>{s=Math.max(0,Math.round(s));const m=Math.floor(s/60),r=s%60;return`${m}:${String(r).padStart(2,'0')}`;};

// Path equalization
function pathTimeToS6(k){
  const seq=PATHS[k].seq;let t=0;
  for(let i=1;i<seq.length;i++){const sid=seq[i];if(sid==='s7')break;t+=getT(seq[i-1],seq[i]);if(sid!=='s6')t+=STATIONS[sid].dur||0;if(sid==='s6')break;}
  return t;
}
const PATH_TO_S6={A:pathTimeToS6('A'),B:pathTimeToS6('B'),C:pathTimeToS6('C')};
const MAX_S6=Math.max(...Object.values(PATH_TO_S6));
const BASE_DELAY={A:Math.round(MAX_S6-PATH_TO_S6.A),B:Math.round(MAX_S6-PATH_TO_S6.B),C:Math.round(MAX_S6-PATH_TO_S6.C)};

/* ── FIREBASE DB HELPERS ───────────────────────────────────────────── */
const dbSet=(path,val)=>fdb.ref(path).set(val);
const dbUpdate=(path,val)=>fdb.ref(path).update(val);
const dbGet=path=>fdb.ref(path).once('value').then(s=>s.val());

/* ── DISPATCH ENGINE (writes to Firebase) ──────────────────────────── */
async function dispatchFromS3(pid, forced=false){
  const p=await dbGet('/participants/'+pid);
  if(!p||(p.status!=='waiting_s3'&&p.status!=='s3_holding')) return;

  const path=PATHS[p.path];
  const nextIdx=(p.stepIndex??0)+1;
  if(nextIdx>=path.seq.length) return;

  const fromSid='s3';
  const toSid=path.seq[nextIdx];
  const toSt=st(toSid);
  const tDur=getT(fromSid,toSid);

  // Rule 1: path delay
  if(!forced){
    const earliest=(p.registeredAt||now())+BASE_DELAY[p.path]*1000;
    if(now()<earliest){
      const waitMs=earliest-now();
      await dbUpdate('/participants/'+pid,{status:'s3_holding',holdUntil:earliest});
      setTimeout(()=>dispatchFromS3(pid,true),waitMs+100);
      return;
    }
  }

  // Rule 2: solo anti-queue
  if(toSt.solo||toSt.cap===1){
    const soloFreeAt=(await dbGet('/soloFreeAt/'+toSid))||0;
    const arrivalTime=now()+tDur*1000;
    if(!forced&&arrivalTime<soloFreeAt-5000){
      const waitMs=soloFreeAt-tDur*1000-now();
      await dbUpdate('/participants/'+pid,{status:'s3_holding',holdUntil:soloFreeAt-tDur*1000});
      setTimeout(()=>dispatchFromS3(pid,true),Math.max(0,waitMs)+100);
      return;
    }
    // Reserve
    await dbSet('/soloFreeAt/'+toSid,arrivalTime+toSt.dur*1000);
  }

  // Decrement S3
  const s3occ=await dbGet('/occupancy/s3')||0;
  await dbSet('/occupancy/s3',Math.max(0,s3occ-1));

  // Send to transit
  await dbUpdate('/participants/'+pid,{
    status:'transit',
    transitStartedAt:now(),
    transitDur:tDur,
    transitTo:toSid,
    stepIndex:nextIdx,
    currentStation:null,
    stationStartedAt:null,
    stationCap:toSt.cap,
    holdUntil:null,
  });

  // Schedule arrival
  setTimeout(()=>handleArrival(pid,toSid),tDur*1000+200);
}

async function handleArrival(pid, sid){
  const p=await dbGet('/participants/'+pid);
  if(!p||p.transitTo!==sid) return; // state changed
  const s=st(sid);

  if(s.group&&s.cap>1){
    // Add to group buffer, mark as buffering
    await dbUpdate('/participants/'+pid,{
      status:'buffering',
      currentStation:sid,
      transitTo:null,
      transitStartedAt:null,
      transitDur:null,
    });
    const occNow=(await dbGet('/occupancy/'+sid))||0;
    await dbSet('/occupancy/'+sid,occNow+1);
    // Check if group complete
    await checkGroupLaunch(sid);
  } else {
    // Solo: arrive directly
    const occNow=(await dbGet('/occupancy/'+sid))||0;
    await dbSet('/occupancy/'+sid,occNow+1);
    await dbUpdate('/participants/'+pid,{
      status:'active',
      currentStation:sid,
      transitTo:null,
      transitStartedAt:null,
      transitDur:null,
      stationStartedAt:now(),
    });
    // Schedule notification when session ends
    if(s.dur>0){
      setTimeout(()=>addNotif(pid,`${pid} — czas minął · ${s.name}`,'warn'),s.dur*1000);
    }
  }
}

async function checkGroupLaunch(sid){
  const s=st(sid);
  const allP=await dbGet('/participants')||{};
  const buffering=Object.values(allP).filter(p=>p.status==='buffering'&&p.currentStation===sid);

  let needed=s.cap;
  if(sid==='s6') needed=15;
  if(sid==='s7') needed=30;

  if(buffering.length>=needed){
    const group=buffering.slice(0,needed);
    const t=now();
    for(const p of group){
      await dbUpdate('/participants/'+p.id,{status:'active',stationStartedAt:t});
    }
    if(s.dur>0){
      setTimeout(async()=>{
        for(const p of group) await addNotif(p.id,`${p.id} — czas minął · ${s.name}`,'warn');
      },s.dur*1000);
    }
  }
}

async function advanceParticipant(pid){
  const p=await dbGet('/participants/'+pid);
  if(!p||p.status==='done') return;

  const path=PATHS[p.path];
  const curIdx=p.stepIndex??0;
  const nextIdx=curIdx+1;

  // Leave station
  if(p.currentStation){
    const occ=(await dbGet('/occupancy/'+p.currentStation))||0;
    await dbSet('/occupancy/'+p.currentStation,Math.max(0,occ-1));
  }

  if(nextIdx>=path.seq.length){
    await dbUpdate('/participants/'+pid,{status:'done',currentStation:null,stationStartedAt:null});
    return;
  }

  const fromSid=path.seq[curIdx];
  const toSid=path.seq[nextIdx];
  const toSt=st(toSid);
  const tDur=getT(fromSid,toSid);

  // Solo anti-queue from non-S3
  if(toSt.solo||toSt.cap===1){
    const soloFreeAt=(await dbGet('/soloFreeAt/'+toSid))||0;
    const arrivalTime=now()+tDur*1000;
    if(arrivalTime<soloFreeAt-5000){
      // Bounce to S3
      const s3occ=(await dbGet('/occupancy/s3'))||0;
      if(s3occ<10){
        await dbSet('/occupancy/s3',s3occ+1);
        await dbUpdate('/participants/'+pid,{
          status:'s3_holding',currentStation:'s3',stationStartedAt:null,
          stepIndex:curIdx,holdUntil:soloFreeAt-tDur*1000,transitTo:null,
        });
        setTimeout(()=>dispatchFromS3(pid,true),Math.max(100,soloFreeAt-tDur*1000-now()));
        await addNotif(pid,`${pid} → S3 (S${toSt.num} zajęta)`,'warn');
        return;
      }
    }
    await dbSet('/soloFreeAt/'+toSid,now()+tDur*1000+toSt.dur*1000);
  }

  await dbUpdate('/participants/'+pid,{
    status:'transit',transitStartedAt:now(),transitDur:tDur,
    transitTo:toSid,stepIndex:nextIdx,currentStation:null,stationStartedAt:null,
    stationCap:toSt.cap,
  });
  setTimeout(()=>handleArrival(pid,toSid),tDur*1000+200);
}

async function addNotif(pid,msg,type='info'){
  const id=now()+Math.random();
  await dbSet('/notifications/'+id,{id,pid,msg,time:now(),type});
}

/* ── REACT HOOKS ───────────────────────────────────────────────────── */
function useFirebase(path){
  const [val,setVal]=useState(null);
  useEffect(()=>{
    const ref=fdb.ref(path);
    ref.on('value',snap=>setVal(snap.val()));
    return()=>ref.off();
  },[path]);
  return val;
}

function useToast(){
  const [ts,setTs]=useState([]);
  const add=useCallback((msg,type='ok')=>{
    const id=now();
    setTs(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setTs(t=>t.filter(x=>x.id!==id)),3400);
  },[]);
  return{ts,add};
}

/* ── QR MODAL ──────────────────────────────────────────────────────── */
function QRModal({pid,onClose}){
  const ref=useRef(null);
  const url=PARTICIPANT_URL+'?id='+pid;

  useEffect(()=>{
    if(!ref.current) return;
    ref.current.innerHTML='';
    try{
      new QRCode(ref.current,{
        text:url,width:180,height:180,
        colorDark:'#00e87a',colorLight:'#000000',
        correctLevel:QRCode.CorrectLevel.M
      });
    }catch(e){
      ref.current.innerHTML=`<div style="color:var(--t3);font-size:9px;padding:20px;word-break:break-all">${url}</div>`;
    }
  },[pid]);

  return(
    <div className="qr-modal" onClick={onClose}>
      <div className="qr-box" onClick={e=>e.stopPropagation()}>
        <div className="qr-title">QR Code — {pid}</div>
        <div ref={ref} style={{display:'flex',justifyContent:'center',background:'#000',padding:10,borderRadius:4}}/>
        <div className="qr-id">{pid}</div>
        <div className="qr-url">{url}</div>
        <button className="btn bx sm" style={{marginTop:16,width:'100%'}} onClick={onClose}>Zamknij</button>
      </div>
    </div>
  );
}

/* ── TIMER BAR ─────────────────────────────────────────────────────── */
function TimerBar({startedAt,dur}){
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);
  if(!startedAt||!dur) return null;
  const el=Math.floor((now()-startedAt)/1000);
  const pct=Math.min(100,(el/dur)*100);
  const rem=Math.max(0,dur-el);
  const over=el>dur;
  const col=over?'var(--red)':pct>80?'var(--amber)':'var(--green)';
  return(
    <div>
      <div className="tbar"><div className="tfill" style={{width:pct+'%',background:col}}/></div>
      <div className="tlabel"><span style={{color:col}}>{over?'+':''}{fmtSec(el)}</span><span style={{color:rem<30?'var(--red)':undefined}}>{fmtSec(rem)}</span></div>
    </div>
  );
}

    await advanceParticipant(pid);

  };

  const startShow=async()=>{
    await dbSet('/showStarted',true);
    await dbSet('/showStartAt',now());

function StationInterface({toast}){
  const [sel,setSel]=useState(null);
  const [scanResult,setScanResult]=useState('');
  const [,setT]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setT(x=>x+1),1000);return()=>clearInterval(t);},[]);

  const occupancy=useFirebase('/occupancy')||{};
  const participants=useFirebase('/participants')||{};
  const pList=Object.values(participants);

  // Handle QR scan — extracts ?id= from URL
  const handleScan=(val)=>{
    const match=val.match(/[?&]id=([^&]+)/i);
    const id=match?match[1].toUpperCase():val.trim().toUpperCase();
    setScanResult(id);
    toast.add('Zeskanowano: '+id,'ok');
  };

  if(!sel){
    return(
      <div className="sif">
        <div className="sif-hd">Wybierz stację</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:9,maxWidth:520,width:'100%'}}>

            const occ=occupancy[station.id]||0;const full=occ>=station.cap;
            return(
              <button key={station.id} onClick={()=>setSel(station.id)} style={{background:'var(--bg3)',border:`1px solid ${full?'var(--red)':occ>0?'var(--green)':'var(--line)'}`,borderRadius:4,padding:16,cursor:'pointer',fontFamily:'var(--mono)',color:'var(--text)',textAlign:'center'}}>
                <div style={{fontSize:8,color:'var(--t2)',marginBottom:5,letterSpacing:2,textTransform:'uppercase'}}>{station.name}</div>
                <div style={{fontSize:26,color:full?'var(--red)':occ>0?'var(--green)':'var(--t3)',fontWeight:300}}>{occ}</div>
                <div style={{fontSize:8,color:'var(--t3)'}}>/{station.cap}</div>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  const station=STATIONS[sel];
  const occ=occupancy[sel]||0;
  const full=occ>=station.cap;
  const stPpl=pList.filter(p=>p.currentStation===sel&&(p.status==='active'||p.status==='buffering'));
  const elapsed=stPpl[0]?.stationStartedAt?Math.floor((now()-stPpl[0].stationStartedAt)/1000):0;
  const pct=station.dur>0?Math.min(100,(elapsed/station.dur)*100):0;
  const over=station.dur>0&&elapsed>station.dur;

  const endSession=async()=>{
    const activePpl=stPpl.filter(p=>p.status==='active');
    if(activePpl.length===0){toast.add('Nikt tu nie jest','err');return;}
    for(const p of activePpl) await addNotif(p.id,`${p.id} skończyła ${station.name}`,'warn');
    if('vibrate' in navigator) navigator.vibrate([200,100,200]);
    toast.add('Admin powiadomiony','ok');
  };

  // QR scan input
  const scanInput=useRef(null);

  return(
    <div className="sif">
      <button className="sif-back" onClick={()=>setSel(null)}>← Zmień stację</button>
      <div className="sif-hd">Performer Interface</div>
      <div className="sif-name">{station.name}</div>
      <div className="sif-cap">{station.cap===1?'solo':station.isFinal?`finał ${station.cap}`:`grupa ${station.cap}`}</div>
      <div className="sif-occ" style={{color:full?'var(--red)':occ>0?'var(--green)':'var(--t3)'}}>{occ}</div>
      {station.dur>0&&stPpl.length>0&&(
        <>
          <div className="sif-timer" style={{color:over?'var(--red)':pct>80?'var(--amber)':'var(--green)'}}>
            {over?'+':''}{fmtSec(elapsed)} / {fmtSec(station.dur)}
          </div>
          <div className="sif-tbar"><div className="sif-tfill" style={{width:pct+'%',background:over?'var(--red)':pct>80?'var(--amber)':'var(--green)'}}/></div>
        </>
      )}
      <div className="sif-plist">
        {stPpl.map(p=><span key={p.id} className="badge bg-g">{p.id}</span>)}
        {stPpl.length===0&&<span className="dim">brak uczestników</span>}
      </div>

      {/* QR SCAN AREA */}
      <div style={{width:'100%',maxWidth:280,marginBottom:16}}>
        <div style={{fontFamily:'var(--mono)',fontSize:8,letterSpacing:2,color:'#1a2535',textTransform:'uppercase',marginBottom:6,textAlign:'center'}}>Skanuj QR uczestnika</div>
        <input
          ref={scanInput}
          style={{background:'#050709',border:'1px solid #0e1822',color:'#dde4ee',textAlign:'center',fontSize:12,letterSpacing:2,padding:10,fontFamily:'var(--mono)',borderRadius:2}}
          placeholder="ID lub zeskanuj QR"
          value={scanResult}
          onChange={e=>setScanResult(e.target.value.toUpperCase())}
          onKeyDown={e=>{if(e.key==='Enter')handleScan(scanResult);}}
          onPaste={e=>{
            const txt=e.clipboardData.getData('text');
            e.preventDefault();
            handleScan(txt);
          }}
        />
        {scanResult&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--green)',textAlign:'center',marginTop:6}}>{scanResult} ✓</div>}
      </div>

      <div className="sif-act">
        <button className="sif-btn sif-fn" onClick={endSession} disabled={occ===0}>
          ✕ Koniec sceny · Powiadom admina
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
